name: RL Backtest Trained Models

on:
  workflow_dispatch:

jobs:
  backtest-models:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    
    - name: Download trained models
      run: |
        mkdir -p trained_models
        # Get the latest successful training run
        RUN_ID=$(gh run list --workflow="RL Training v3.0 - Dual API Parallel 🚀" --status=success --limit=1 --json databaseId -q '.[0].databaseId')
        echo "Using run ID: $RUN_ID"
        
        # Download models from each successful group
        for artifact in rl-v3-models-korea rl-v3-models-us-semi rl-v3-models-us-tech rl-v3-models-us-others; do
          gh run download $RUN_ID --name $artifact --dir ./trained_models/ 2>/dev/null || echo "Artifact $artifact not found"
        done
        
        echo "=== Downloaded Models ==="
        ls -la trained_models/
        echo ""
        echo "Total models: $(ls trained_models/*.zip 2>/dev/null | wc -l)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Run backtesting
      run: |
        python3 backtest_v3_fixed.py
      continue-on-error: true  # 에러나도 계속 진행
    
    - name: Upload backtest results
      uses: actions/upload-artifact@v4
      if: always()  # 항상 업로드
      with:
        name: rl-v3-backtest-full
        path: |
          backtest_results.json
          backtest_summary.txt
        if-no-files-found: ignore  # 파일 없어도 OK
    
    - name: Display results
      if: always()
      run: |
        echo "═══════════════════════════════════════════"
        echo "  RL v3.0 백테스트 결과"
        echo "═══════════════════════════════════════════"
        if [ -f backtest_summary.txt ]; then
          cat backtest_summary.txt
        else
          echo "⚠️ 결과 파일 없음"
        fi
        echo "═══════════════════════════════════════════"
