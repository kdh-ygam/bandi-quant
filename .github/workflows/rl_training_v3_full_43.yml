name: RL Training v3.1 - Full 43 Stocks + KIS API 🚀

on:
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  RL_AGGRESSIVE: "true"

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1: 한국 주식 - 21종목 (한투 API)
  # ═══════════════════════════════════════════════════════════
  train-korea-full:
    runs-on: ubuntu-latest
    
    env:
      DATA_SOURCE: "KIS"
      STOCKS: "000660.KS,005930.KS,042700.KS,001740.KS,068270.KS,207940.KS,196170.KS,136480.KS,005380.KS,000270.KS,012330.KS,373220.KS,006400.KS,005490.KS,247540.KS,010120.KS,267260.KS,051600.KS,052690.KS,003670.KS,003620.KS"
      DELAY_BETWEEN_STOCKS: "1"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    
    - name: Create model directory
      run: mkdir -p rl_models_v3
    
    - name: Train Korea Stocks (21종목)
      run: |
        python3 train_dual_api.py --source KIS --stocks "$STOCKS"
      env:
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
    
    - name: Upload models
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-models-korea-full
        path: rl_models_v3/bandi_rl_KIS_*.zip
        retention-days: 30
        if-no-files-found: warn
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-results-korea-full
        path: training_results_KIS.json
        retention-days: 30
        if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════
  # Job 2: 미국 반도체 - 3종목 (Yahoo)
  # ═══════════════════════════════════════════════════════════
  train-us-semiconductor:
    runs-on: ubuntu-latest
    
    env:
      DATA_SOURCE: "YAHOO"
      STOCKS: "NVDA,AMD,ARM"
      RATE_LIMIT_DELAY: "3"
      DELAY_BETWEEN_STOCKS: "5"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    
    - name: Create model directory
      run: mkdir -p rl_models_v3
    
    - name: Train US Semiconductor
      run: |
        python3 train_dual_api.py --source YAHOO --stocks "$STOCKS"
    
    - name: Upload models
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-models-us-semi
        path: rl_models_v3/bandi_rl_YAHOO_*.zip
        retention-days: 30
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-results-us-semi
        path: training_results_YAHOO.json
        retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # Job 3: 미국 기술/자동차 - 9종목 (Yahoo)
  # ═══════════════════════════════════════════════════════════
  train-us-tech-auto:
    runs-on: ubuntu-latest
    
    env:
      DATA_SOURCE: "YAHOO"
      STOCKS: "TSLA,F,GM,RIVN,PLTR,AI,SNOW,CRWD,ONON"
      RATE_LIMIT_DELAY: "3"
      DELAY_BETWEEN_STOCKS: "5"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    
    - name: Create model directory
      run: mkdir -p rl_models_v3
    
    - name: Train US Tech/Auto
      run: |
        python3 train_dual_api.py --source YAHOO --stocks "$STOCKS"
    
    - name: Upload models
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-models-us-tech
        path: rl_models_v3/bandi_rl_YAHOO_*.zip
        retention-days: 30
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-results-us-tech
        path: training_results_YAHOO.json
        retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # Job 4: 미국 기타 - 9종목 (Yahoo)
  # ═══════════════════════════════════════════════════════════
  train-us-others:
    runs-on: ubuntu-latest
    
    env:
      DATA_SOURCE: "YAHOO"
      STOCKS: "NEE,ENPH,SEDG,FSLR,RUN,BE,ALB,QS,JNJ"
      RATE_LIMIT_DELAY: "3"
      DELAY_BETWEEN_STOCKS: "5"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    
    - name: Create model directory
      run: mkdir -p rl_models_v3
    
    - name: Train US Others
      run: |
        python3 train_dual_api.py --source YAHOO --stocks "$STOCKS"
    
    - name: Upload models
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-models-us-others
        path: rl_models_v3/bandi_rl_YAHOO_*.zip
        retention-days: 30
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-results-us-others
        path: training_results_YAHOO.json
        retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # Job 5: 결과 병합 및 보고서
  # ═══════════════════════════════════════════════════════════
  merge-results:
    runs-on: ubuntu-latest
    needs: [train-korea-full, train-us-semiconductor, train-us-tech-auto, train-us-others]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: rl-v3-*
    
    - name: Merge training results
      run: |
        python3 << 'EOF'
        import json
        import os
        from pathlib import Path

        all_results = {
          "timestamp": "${{ github.event.repository.updated_at }}",
          "run_id": "${{ github.run_id }}",
          "version": "v3.1-full-43stocks",
          "jobs": {}
        }

        total_success = 0
        total_stocks = 0

        for result_file in Path("artifacts").rglob("training_results_*.json"):
            try:
                with open(result_file) as f:
                    data = json.load(f)
                    source = data.get('source', 'unknown')
                    all_results['jobs'][source] = data
                    
                    results = data.get('results', [])
                    success = sum(1 for r in results if r.get('success'))
                    total_success += success
                    total_stocks += len(results)
                    print(f"{source}: {success}/{len(results)} 성공")
            except Exception as e:
                print(f"Error: {e}")

        all_results['summary'] = {
            'total_success': total_success,
            'total_stocks': total_stocks,
            'success_rate': f"{total_success/total_stocks*100:.1f}%" if total_stocks > 0 else "N/A"
        }

        with open("training_results_merged.json", "w") as f:
            json.dump(all_results, f, indent=2, ensure_ascii=False)

        print(f"\n{'='*50}")
        print(f"🎯 총 학습: {total_success}/{total_stocks} 종목")
        print(f"{'='*50}")
        EOF
    
    - name: Upload merged results
      uses: actions/upload-artifact@v4
      with:
        name: rl-v3-final-report-full
        path: training_results_merged.json
        retention-days: 30
    
    - name: Summary
      run: |
        echo "═══════════════════════════════════════════"
        echo "  🚀 RL Training v3.1 - 43종목 완료!"
        echo "═══════════════════════════════════════════"
        echo ""
        echo "Jobs:"
        echo "  - 🇰🇷 Korea (21종목, KIS API)"
        echo "  - 🇺🇸 US Semiconductor (3종목)"
        echo "  - 🇺🇸 US Tech/Auto (9종목)"
        echo "  - 🇺🇸 US Others (9종목)"
        echo ""
        echo "총: 43종목"
        echo "═══════════════════════════════════════════"
        
        # 보고용 JSON 생성
        echo '{"status":"completed","run_id":"'${{ github.run_id }}'"}' > notify.json

    - name: Notify Telegram 📨
      if: always()
      run: |
        STATUS="✅ 성공"
        if [ "${{ job.status }}" != "success" ]; then
          STATUS="❌ 실패"
        fi
        
        # 결과 파일에서 성공률 추출
        SUCCESS_RATE=$(cat training_results_merged.json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary',{}).get('success_rate','N/A'))" 2>/dev/null || echo "N/A")
        TOTAL_SUCCESS=$(cat training_results_merged.json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary',{}).get('total_success','?'))" 2>/dev/null || echo "?")
        TOTAL_STOCKS=$(cat training_results_merged.json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary',{}).get('total_stocks','?'))" 2>/dev/null || echo "?")
        
        MESSAGE="🚀 *RL 학습 완료 보告*%0A%0A"
        MESSAGE+="📊 상태: $STATUS%0A"
        MESSAGE+="🎯 결과: ${TOTAL_SUCCESS}/${TOTAL_STOCKS} 종목 ($SUCCESS_RATE)%0A"
        MESSAGE+="🔗 링크: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A"
        MESSAGE+="⏰ 완료시간: $(date '+%Y-%m-%d %H:%M KST')%0A"
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=Markdown" \
          --max-time 10 || echo "Telegram 알림 실패 (무시됨)"
